<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UK Election Nowcast</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  :root{
    --bg:#E2E4E4; --panel:#fbf7f4; --ink:#15171a; --muted:#6b7280; --faint:#9ca3af;
    --line:#e3e3df; --line2:#eeeeea; --accent:#004d4d; --purple:#7c3aed; --purple-bg:#f5f1ff; --radius:10px;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--bg); color:var(--ink); font-family:'Inter',system-ui,sans-serif; -webkit-font-smoothing:antialiased;}
  .wrap{max-width:1120px; margin:0 auto; padding:24px 20px 80px;}
  .masthead{display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; margin-bottom:14px;}
  .masthead h1{font-size:1.55rem; font-weight:900; letter-spacing:-0.03em; margin:0;}
  .modepill{font-size:.7rem; font-weight:800; text-transform:uppercase; letter-spacing:.06em; padding:6px 11px; border-radius:7px; background:#eef2f2; color:var(--accent);}
  body.custom .modepill{background:var(--purple); color:#fff;}
  .custombanner{display:none; background:var(--purple-bg); border:1px solid #ddd0ff; color:#5b21b6; font-weight:600; font-size:.85rem; padding:10px 14px; border-radius:12px; margin-bottom:18px;}
  body.custom .custombanner{display:block;}
  .grid{display:grid; grid-template-columns:minmax(0,1fr) 296px; gap:24px; align-items:stretch;}
  .grid>*{min-width:0;}
  .leftcol,.controls-panel,.fullspan{min-width:0;}
  @media(max-width:880px){ .grid{grid-template-columns:1fr;} }
  .leftcol{display:flex; flex-direction:column;}
  .leftcol #map-container{flex:1;}
  .fullspan{grid-column:1 / -1;}
  .r2grid{display:grid; grid-template-columns:minmax(0,1fr) 296px; gap:10px 24px; align-items:stretch; margin-top:-20px;}
  .r2grid #map-container{grid-column:1;} .r2grid .slidersbox{grid-column:2;} .r2grid .mapcredit{grid-column:1;}
  .topctrls{grid-column:1 / -1; display:grid; grid-template-columns:minmax(0,1fr) 296px; column-gap:24px; row-gap:10px; align-items:start;}
  .topctrls > *{margin:0; min-width:0;}
  .topctrls .section-h{grid-column:1; grid-row:1;}
  .topctrls .mapmodes{grid-column:1; grid-row:2;}
  .topctrls .mapsearch{grid-column:1; grid-row:3;}
  .topctrls .mapgrp{grid-column:1; grid-row:4; align-self:end; display:flex; gap:8px; min-width:0;}
  .topctrls .modegrp{grid-column:2; grid-row:3 / 5; align-self:stretch; display:flex; flex-direction:column; gap:8px; min-width:0;}
  .topctrls .mapgrp button, .topctrls .modegrp button{flex:1 1 0; min-width:0; padding:8px 10px; border-radius:7px; font-weight:700; font-size:.78rem; font-family:inherit; cursor:pointer; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; display:flex; align-items:center; justify-content:center; text-align:center;}
  @media(max-width:880px){ .topctrls .mapgrp{grid-row:auto;} .topctrls .modegrp{grid-row:auto;} }
  @media(max-width:880px){ .r2grid{grid-template-columns:1fr;} .r2grid>*{grid-column:1 !important;} .topctrls{grid-template-columns:1fr;} .topctrls>*{grid-column:1 !important; grid-row:auto !important;} .topctrls .topbtns{grid-row:auto !important;} }
  .panel{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:20px; transition:border-color .2s, box-shadow .2s;}
  body.custom .panel, body.custom #map-container{border-color:#a78bfa; box-shadow:0 0 0 3px var(--purple-bg);}
  .panel h2{font-size:.72rem; text-transform:uppercase; letter-spacing:.09em; color:var(--faint); font-weight:700; margin:0 0 14px;}

  .sld{margin-bottom:13px; opacity:1; transition:opacity .2s;}
  body:not(.custom) .sld{opacity:.55;}
  .sld .top{display:flex; align-items:center; justify-content:space-between; margin-bottom:6px;}
  .sld .lab{display:flex; align-items:center; gap:8px; font-weight:600; font-size:.88rem;}
  .dot{width:11px; height:11px; border-radius:3px; flex:none;}
  .sld .val{display:flex; align-items:center; gap:2px;}
  .sld .val input{width:62px; border:1px solid var(--line); border-radius:7px; padding:4px 7px; text-align:right; font-weight:700; font-size:.9rem; font-family:inherit; font-variant-numeric:tabular-nums; color:var(--ink); background:#fff;}
  .sld .val input:disabled{border-color:transparent; background:transparent;}
  .sld .val small{color:var(--faint); font-weight:600;}
  input[type=range]{-webkit-appearance:none; appearance:none; width:100%; height:11px; border-radius:99px; background:var(--line); outline:none; margin:2px 0;}
  input[type=range]:disabled{opacity:.6;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none; width:24px; height:24px; border-radius:50%; background:var(--c,#444); border:3px solid #fff; box-shadow:0 1px 5px rgba(0,0,0,.3); cursor:grab; margin-top:0;}
  input[type=range]:disabled::-webkit-slider-thumb{cursor:not-allowed;}
  input[type=range]::-moz-range-thumb{width:24px; height:24px; border-radius:50%; background:var(--c,#444); border:3px solid #fff; box-shadow:0 1px 5px rgba(0,0,0,.3);}
  input[type=range]::-moz-range-track{height:11px; border-radius:99px;}
  .group-label{font-size:.72rem; text-transform:uppercase; letter-spacing:.09em; color:var(--faint); font-weight:700; margin:18px 0 12px; padding-top:14px; border-top:1px solid var(--line2);}
  .total-line{margin-top:14px; padding-top:14px; border-top:1px solid var(--line2); font-size:.82rem; color:var(--muted); display:flex; justify-content:space-between;}
  .total-line b{color:var(--ink); font-variant-numeric:tabular-nums;} .total-line b.warn{color:#d97706;}
  .mc{display:flex; flex-direction:column; justify-content:center; gap:16px;}
  .mapcol{min-width:0;}
  .mc h3{font-size:.72rem; text-transform:uppercase; letter-spacing:.09em; color:var(--faint); font-weight:700; margin:0 0 12px; display:flex; justify-content:space-between; align-items:baseline; gap:8px;}
  .mc h3 .sims{font-weight:600; text-transform:none; letter-spacing:0; color:var(--faint); font-size:.7rem;}
  .mc-big{font-size:2.9rem; font-weight:900; line-height:1; letter-spacing:-0.02em;}
  .mc-sub{font-size:.95rem; color:var(--muted); margin:8px 0 0; line-height:1.5;}
  .mc-sub b{color:var(--ink);}
  .mc-row{display:flex; align-items:center; gap:9px; margin-bottom:9px;}
  .mc-row .mcab{width:40px; font-size:.7rem; font-weight:800; text-align:center; padding:4px 0; border-radius:5px; color:#fff; flex:none;}
  .mc-row .mcbar{flex:1; height:18px; background:var(--line2); border-radius:5px; overflow:hidden; position:relative;}
  .mc-row .mcbar i{position:absolute; left:0; top:0; height:100%; border-radius:4px; transition:width .3s;}
  .mc-row .mcpct{width:46px; text-align:right; font-weight:800; font-size:.92rem; font-variant-numeric:tabular-nums; flex:none;}
  .mc-row .mcpct.maj{color:var(--accent);}
  .mc-head{display:flex; align-items:center; gap:9px; font-size:.66rem; text-transform:uppercase; letter-spacing:.04em; color:var(--faint); font-weight:800; margin-bottom:5px;}
  .mc-head .hsp{width:34px; flex:none;} .mc-head .hbar{flex:1;} .mc-head .hp{width:40px; text-align:right; flex:none;}
  .mc-prog{height:4px; background:var(--line2); border-radius:99px; overflow:hidden; margin-top:8px;}
  .mc-prog i{display:block; height:100%; width:0; background:var(--accent); transition:width .2s;}
  .ctrls{display:flex; gap:8px; margin-top:16px; flex-wrap:wrap;}
  .btn{flex:1; min-width:90px; padding:10px; border-radius:8px; border:1px solid var(--line); background:#fff; color:var(--ink); font-weight:700; font-size:.82rem; cursor:pointer; font-family:inherit;}
  .btn:hover{border-color:var(--accent); color:var(--accent);}
  .btn.primary{background:var(--accent); color:#fff; border-color:var(--accent);} .btn.primary:hover{background:#003a3a; color:#fff;}
  .btn.purple{background:var(--purple); color:#fff; border-color:var(--purple);} .btn.purple:hover{background:#6d28d9; color:#fff;}

  .headline{display:flex; align-items:baseline; gap:12px; flex-wrap:wrap; margin-bottom:4px;}
  .headline .big{font-size:1.5rem; font-weight:900; letter-spacing:-0.02em;}
  .headline .maj{font-size:.9rem; font-weight:600; color:var(--muted);} .headline .maj.gov{color:#16a34a;}
  .seatbar{position:relative; height:38px; border-radius:7px; overflow:hidden; display:flex; margin:16px 0 6px; background:var(--line2);}
  .seatbar .seg{height:100%; transition:width .35s cubic-bezier(.4,0,.2,1);}
  .majmark{position:absolute; top:-4px; bottom:-4px; left:50.78%; width:2px; background:#15171a; z-index:3;}
  .majmark::after{content:'326'; position:absolute; top:-15px; left:50%; transform:translateX(-50%); font-size:.6rem; font-weight:700; color:var(--faint);}
  .totstrip{display:grid; grid-template-columns:repeat(5,minmax(0,1fr)); gap:8px; margin-top:18px;}
  @media(max-width:600px){ .totstrip{grid-template-columns:repeat(3,minmax(0,1fr));} }
  .tot{border-radius:8px; padding:11px 12px;}
  .tot .nm{font-size:.7rem; font-weight:800; text-transform:uppercase; letter-spacing:.02em; opacity:.92; margin-bottom:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .tot .n{font-size:1.75rem; font-weight:900; line-height:1; font-variant-numeric:tabular-nums;}
  .tot .ch{display:inline-block; margin-top:4px; background:rgba(0,0,0,.2); padding:1px 7px; border-radius:5px; font-size:.74rem; font-weight:800; font-variant-numeric:tabular-nums;}
  .tot .rng{font-size:.62rem; font-weight:700; opacity:.85; margin-top:3px; font-variant-numeric:tabular-nums;}

  .section-h{font-size:.72rem; text-transform:uppercase; letter-spacing:.09em; color:var(--faint); font-weight:700; margin:28px 0 12px;}
  #map-container{position:relative; width:100%; height:720px; min-height:720px; background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden;}
  #map-container svg{cursor:grab;} #map-container svg:active{cursor:grabbing;}
  .cp{stroke:#fff; vector-effect:non-scaling-stroke; stroke-linejoin:round; stroke-linecap:round; transition:fill .18s; cursor:pointer;}
  .cp:hover{stroke:#15171a; stroke-width:1.2px;} .cp.pinned{stroke:#15171a; stroke-width:1.4px;}
  .mapmodes{display:flex; gap:6px; margin-bottom:10px; flex-wrap:wrap;}
  .maprow{display:flex; justify-content:space-between; align-items:center; gap:10px; margin:28px 0 12px; flex-wrap:wrap;}
  .maptype{display:flex; gap:6px;}
  .maplayout{display:flex; gap:8px; margin-bottom:10px;}
  .maplayout .mtb{flex:1; text-align:center;}
  .mtb{padding:7px 13px; border-radius:7px; border:1px solid var(--line); background:#fff; font-weight:700; font-size:.78rem; color:var(--muted); cursor:pointer; font-family:inherit;}
  .mtb:hover{border-color:var(--accent); color:var(--accent);}
  .mtb.active{background:var(--accent); color:#fff; border-color:var(--accent);}
  .mmb{padding:7px 13px; border-radius:7px; border:1px solid var(--line); background:#fff; font-weight:700; font-size:.78rem; color:var(--muted); cursor:pointer; font-family:inherit;}
  .mmb:hover{border-color:var(--accent); color:var(--accent);}
  .mmb.active{background:var(--accent); color:#fff; border-color:var(--accent);}
  .map-hint{position:absolute; left:14px; bottom:12px; font-size:.72rem; color:var(--faint); background:rgba(255,255,255,.85); padding:4px 9px; border-radius:8px; pointer-events:none;}
  .mapcredit{font-size:.68rem; color:var(--faint); margin-top:8px; line-height:1.4;}
  .r2grid .mapcredit{margin-top:-2px;}
  .mapcredit a{color:var(--faint);}
  .mapsearch{margin-bottom:10px;}
  .mapsearch input{width:100%; padding:10px 13px; border:1px solid var(--line); border-radius:8px; font-family:inherit; font-size:.85rem; font-weight:600; color:var(--ink); background:#fff;}
  .mapsearch input::placeholder{color:var(--faint); font-weight:500;}
  .mapsearch input:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(0,77,77,.08);}

  /* branded tooltip card */
  #tip{position:fixed; pointer-events:none; z-index:60; width:230px; display:none; border-radius:12px; overflow:hidden; box-shadow:0 12px 32px rgba(0,0,0,.2); background:#fff;}
  #tip .hd{background:rgb(0,38,38); color:#fff; padding:11px 12px 10px;}
  #tip .hd .nm{font-size:1.12rem; font-weight:800; line-height:1.12; letter-spacing:-0.01em;}
  #tip .hd .res{display:flex; gap:4px; align-items:stretch; margin:8px 0 7px; height:26px;}
  #tip .hd .sq{width:27px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:.72rem;}
  #tip .hd .pill{flex:1; border-radius:6px; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:.82rem;}
  #tip .hd .meta{font-size:.72rem; opacity:.92; line-height:1.4;}
  #tip .hd .meta b{font-weight:700;}
  #tip .bd{padding:9px 12px 5px;}
  #tip .r{display:grid; grid-template-columns:32px 1fr 42px; align-items:center; gap:6px; margin-bottom:4px;}
  #tip .r .ab{font-size:.66rem; font-weight:800; text-align:center; padding:2px 0; border-radius:4px;}
  #tip .r .bar{position:relative; height:17px; background:#eee; border-radius:4px; overflow:hidden;}
  #tip .r .bar i{position:absolute; left:0; top:0; height:100%; border-radius:4px;}
  #tip .r .bar span{position:absolute; left:7px; top:0; height:100%; display:flex; align-items:center; font-size:.68rem; font-weight:800; color:#fff;}
  #tip .r .chg{font-size:.64rem; font-weight:800; text-align:center; padding:2px 0; border-radius:4px; background:#f0f0ee; color:var(--faint); font-variant-numeric:tabular-nums;}
  #tip .r .chg.up{color:#16a34a;} #tip .r .chg.down{color:#dc2626;}
  #tip .ft{text-align:center; padding:6px; color:var(--accent); font-weight:800; font-size:.72rem; border-top:1px solid var(--line2);}

  /* coalition */
  #coalition{margin-top:14px;}
  #coal-total{display:flex; flex-wrap:wrap; align-items:center; justify-content:center; gap:7px; font-size:1.35rem; font-weight:900; letter-spacing:-0.02em; font-variant-numeric:tabular-nums; line-height:1.2; margin:6px 0 14px; color:#dc2626;}
  #coal-total.gov{color:#16a34a;}
  #coal-total .coalchip{display:inline-block; padding:3px 9px; border-radius:6px; font-size:.8rem; font-weight:800; letter-spacing:0;}
  #coal-total .coaloutcome{margin-left:2px;}
  #coal-parties{display:flex; flex-wrap:wrap; gap:7px; justify-content:center; margin-top:16px;}
  .coalbtn{display:flex; flex-direction:column; align-items:center; gap:1px; min-width:44px; padding:5px 9px 6px; border-radius:8px; color:#fff; cursor:pointer; border:1.5px solid transparent; opacity:.38; filter:saturate(.85); transition:all .16s ease;}
  .coalbtn .cab{font-size:.58rem; font-weight:800; letter-spacing:.06em; text-transform:uppercase; opacity:.92;}
  .coalbtn .cn{font-size:.92rem; font-weight:900; line-height:1; font-variant-numeric:tabular-nums;}
  .coalbtn:hover{opacity:.7;}
  .coalbtn.on{opacity:1; filter:none; box-shadow:0 2px 8px rgba(0,0,0,.16); transform:translateY(-1px);}
  .coalbar{height:26px; border-radius:8px; overflow:hidden; display:flex; margin:14px 0 4px; background:var(--line2); position:relative;}
  .coalbar .majmark{}

  .table-tools{display:flex; justify-content:space-between; align-items:center; margin:0 0 12px;}
  .table-tools{display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin:0 0 12px;}
  .tblsearch{flex:1; min-width:160px; max-width:300px; padding:8px 12px; border:1px solid var(--line); border-radius:8px; font-family:inherit; font-size:.82rem; font-weight:600; color:var(--ink); background:#fff;}
  .tblsearch::placeholder{color:var(--faint); font-weight:500;}
  .tblsearch:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(0,77,77,.08);}
  td.code{font-variant-numeric:tabular-nums; color:var(--faint); font-size:.74rem;}
  .table-wrap{display:none; border:1px solid var(--line); border-radius:var(--radius); overflow:auto; max-height:620px;}
  table{width:100%; border-collapse:separate; border-spacing:0; font-size:.78rem;}
  th,td{padding:8px 10px; text-align:center; border-bottom:1px solid var(--line2); white-space:nowrap;}
  th:first-child,td:first-child{text-align:left; position:sticky; left:0; background:var(--panel); z-index:1;}
  th{position:sticky; top:0; z-index:2; background:#fbfbfa; font-size:.65rem; text-transform:uppercase; letter-spacing:.05em; color:var(--faint); font-weight:700; cursor:pointer; border-bottom:2px solid var(--line);}
  th:first-child{z-index:3;}
  th:hover{color:var(--accent);}
  tbody tr:hover td{background:#faf9f6;}
  td{color:var(--muted); font-variant-numeric:tabular-nums;}
  td:first-child{color:var(--ink); font-weight:600;}
  td.win{font-weight:800; text-align:center; font-size:.7rem; padding:6px 8px;}
  td.win span{display:inline-block; min-width:38px; padding:3px 0; border-radius:5px; color:#fff;}
  td.sh{text-align:center; font-variant-numeric:tabular-nums; color:var(--muted);}
  .loading{padding:60px; text-align:center; color:var(--muted); font-weight:600;}
  /* ---- mobile ---- */
  @media(max-width:880px){ .grid{gap:16px;} #map-container{height:560px; min-height:560px;} }
  @media(max-width:600px){
    .wrap{padding:16px 12px 56px;}
    .panel{padding:15px;}
    .masthead{margin-bottom:10px;}
    #map-container{height:430px; min-height:430px;}
    .headline .big{font-size:1.2rem;} .headline .maj{font-size:.8rem;}
    .tot{padding:9px 9px;} .tot .n{font-size:1.4rem;} .tot .nm{font-size:.62rem;}
    .seatbar{height:30px;}
    .mc-big{font-size:1.8rem;}
    .maprow{margin:20px 0 10px;} .section-h{margin:20px 0 10px;}
    .mapmodes{gap:5px;} .mmb{padding:6px 10px; font-size:.72rem;}
    .mtb{padding:6px 11px; font-size:.72rem;}
    table{font-size:.72rem;} th,td{padding:6px 7px;}
  }
  html,body{overflow-x:hidden; max-width:100%;}
  img,svg{max-width:100%;}
  .table-wrap{-webkit-overflow-scrolling:touch;}
  @media(max-width:480px){ .totstrip{grid-template-columns:repeat(2,minmax(0,1fr));} #map-container{height:380px;min-height:380px;} .wrap{padding:14px 10px 50px;} }
</style>
</head>
<body>
<div class="wrap">
  <div class="masthead" style="justify-content:flex-end;">
    <span class="modepill" id="modepill">Central projection</span>
  </div>

  <div id="loading" class="loading">Loading model&hellip;</div>

  <div class="grid" id="app" style="display:none;">
    <div class="panel hlbox">
      <div class="headline" aria-live="polite"><span class="big" id="hl-party">&mdash;</span><span class="maj" id="hl-maj"></span></div>
      <div class="seatbar" id="seatbar"><div class="majmark"></div></div>
      <div class="totstrip" id="totstrip"></div>
    </div>

    <div class="panel mc" id="mc">
      <h3>Majority odds <span class="sims" id="mc-sims"></span></h3>
      <div id="mc-headline" aria-live="polite"><div class="mc-sub">Simulating…</div></div>
      <div id="mc-list"></div>
    </div>

    <div class="fullspan r2grid">
      <div class="topctrls">
        <div class="section-h">Constituency map</div>
        <div class="mapmodes" id="mapmodes">
          <button class="mmb active" data-m="proj">Projection</button>
          <button class="mmb" data-m="actual">2024 Result</button>
          <button class="mmb" data-m="change">Changes</button>
          <button class="mmb" data-m="margin">Margin</button>
        </div>
        <div class="mapsearch"><input id="seatsearch" list="seatlist" placeholder="Search for a constituency…" autocomplete="off" aria-label="Search for a constituency"><datalist id="seatlist"></datalist></div>
        <div class="mapgrp" role="group" aria-label="Map layout and download">
          <button class="mtb active" data-t="geo">Geographic</button>
          <button class="mtb" data-t="hex">Hex</button>
          <button class="mtb" id="dlmap" title="Download a high-resolution PNG of the current map">Download PNG</button>
        </div>
        <div class="modegrp" role="group" aria-label="Projection mode">
          <button class="btn purple" id="modebtn">Switch to User Input</button>
          <button class="btn" id="share">Share</button>
        </div>
        <div id="copied" style="display:none; text-align:center; font-size:.78rem; color:var(--accent); grid-column:1 / -1; margin:0;">Link copied</div>
      </div>

      <div id="map-container"><div class="map-hint">Scroll to zoom &middot; drag to pan &middot; click to pin</div></div>

      <div class="panel slidersbox">
        <h2>National vote share</h2>
        <div id="sliders"></div>
        <div class="total-line"><span>GB total (excl. SNP/Plaid)</span><b id="gbtotal">100%</b></div>
        <div class="group-label">Nations</div>
        <div id="sliders-nat"></div>
      </div>

      <div class="mapcredit" id="mapcredit"></div>
    </div>

    <div class="fullspan">
      <div class="panel" id="coalition" style="margin-top:24px;">

const ENGINE_PARTIES = {
  EngExLondon: ['LAB','CON','RFM','LDM','GRN','RES','MIN','OTH'],
  London:      ['LAB','CON','RFM','LDM','GRN','RES','MIN','OTH'],
  Scotland:    ['LAB','CON','RFM','LDM','GRN','SNP','RES','MIN','OTH'],
  Wales:       ['LAB','CON','RFM','LDM','GRN','PLC','RES','MIN','OTH'],
};
const MAIN_BY_ENGINE = {
  EngExLondon: ['LAB','CON','RFM','LDM','GRN','RES'],
  London:      ['LAB','CON','RFM','LDM','GRN','RES'],
  Scotland:    ['LAB','CON','RFM','LDM','GRN','SNP','RES'],
  Wales:       ['LAB','CON','RFM','LDM','GRN','PLC','RES'],
};

// ---------- helpers ----------
const sum = a => a.reduce((x,y)=>x+y,0);
const clamp = (x,lo,hi) => Math.max(lo, Math.min(hi, x));

// J-curve weak-vote portion of a party's base share
function weakVote(base, opts, cfg) {
  const j = cfg.jcurve;
  let raw = base < j.pivot ? j.baseMult + (j.pivot - base)*j.leftSlope
                           : j.baseMult + (base - j.pivot)*j.rightSlope;
  let floor = j.floor;
  if (opts && opts.greenPenalty) {
    const g = cfg.greenPenalty;
    raw = raw - (opts.con*g.conWeight + opts.ref*g.refWeight) - base*g.satWeight;
    floor = g.floor;
  }
  return base * clamp(raw, floor, j.ceiling);
}

// ---------- Stage 1: regional target vectors from national inputs ----------
function regionalTargets(inp, cfg) {
  const P = cfg.pools;
  const main = ['LAB','CON','RFM','LDM','GRN','RES'];
  const gbV = {}; main.forEach(p => gbV[p] = (inp.gb[p]||0)*P.gb);
  // SNP/Plaid exist only in their nations - keep their GB-equivalent vote OUT of GB 'OTH'
  // (otherwise unallocated nationalist vote inflates OTH and trips the ^10 minor-suppression).
  const snpGB = (inp.scotland&&inp.scotland.SNP||0)*P.scotland;
  const plcGB = (inp.wales&&inp.wales.PLC||0)*P.wales;
  gbV.OTH = Math.max(0, P.gb - sum(main.map(p=>gbV[p])) - snpGB - plcGB);

  const regionVotes = (share, pool, extra) => {
    const v = {}; main.forEach(p => v[p] = (share[p]||0)*pool);
    let used = sum(main.map(p=>v[p]));
    if (extra) { v[extra.key] = (share[extra.key]||0)*pool; used += v[extra.key]; }
    v.OTH = pool - used;            // residual (absorbs nationalist where not broken out)
    return v;
  };
  const scotV = regionVotes(inp.scotland, P.scotland, {key:'SNP'});
  const walesV = regionVotes(inp.wales,   P.wales,   {key:'PLC'});
  const lonRES = (inp.london.RES!=null)? inp.london.RES : (inp.gb.RES||0)*cfg.resRegionalScale.London;
  const lonShare = Object.assign({}, inp.london, {RES: lonRES});
  const lonV = regionVotes(lonShare, P.london, null);

  // England-excl-London residual over {main6, OTH}
  const cols = ['LAB','CON','RFM','LDM','GRN','RES','OTH'];
  const engV = {}; cols.forEach(p => engV[p] = Math.max(0, gbV[p] - scotV[p] - walesV[p] - lonV[p]));
  const engTot = sum(cols.map(p=>engV[p]));
  const engShare = {}; cols.forEach(p => engShare[p] = engTot>0 ? engV[p]/engTot : 0);

  const lonTot = sum(cols.map(p=>lonV[p]));
  const lonShareN = {}; cols.forEach(p => lonShareN[p] = lonTot>0 ? lonV[p]/lonTot : 0);

  return {
    EngExLondon: pick(engShare,   MAIN_BY_ENGINE.EngExLondon),
    London:      pick(lonShareN,  MAIN_BY_ENGINE.London),
    Scotland:    pick(inp.scotland, MAIN_BY_ENGINE.Scotland),   // direct inputs
    Wales:       pick(inp.wales,    MAIN_BY_ENGINE.Wales),
  };
}
function pick(obj, keys){ const o={}; keys.forEach(k=>o[k]=obj[k]||0); return o; }

// Regional anchoring: move a region's LAB/CON/RFM/LDM/GRN from its baseline by a
// blend of additive (uniform) and proportional swing as GB shares change.
function regionalSwing(gb, region, cfg){
  const a = cfg.regionalAnchor[region], mix = cfg.regionalSwingMix, out = {};
  ['LAB','CON','RFM','LDM','GRN'].forEach(p=>{
    const nb=a.national[p]||0, rb=a.regional[p]||0, g=gb[p]||0;
    const additive   = rb + (g - nb);
    const proportional = nb>0 ? rb*(g/nb) : rb;
    // Lean toward proportional as the national share falls below baseline, so a party on ~0%
    // nationally collapses to ~0 regionally too (uniform swing still applies when it grows).
    const effMix = mix * (nb>0 ? Math.min(1, g/nb) : 1);
    out[p] = Math.max(0, effMix*additive + (1-effMix)*proportional);
  });
  return out;
}
// scale LAB..GRN proportionally so they fill `room` (=1-SNP/PLC-RES): SNP/PLC changes
// leak proportionally to/from the other parties instead of all to "others".
function scaleToRoom(obj, room){
  const keys=['LAB','CON','RFM','LDM','GRN']; const s=keys.reduce((a,k)=>a+(obj[k]||0),0);
  if(room<=0){ keys.forEach(k=>obj[k]=0); }
  else if(s>0){ const f=room/s; keys.forEach(k=>obj[k]=(obj[k]||0)*f); }
}
// Expand compact inputs {gb:{LAB..RES}, snpScotland, plcWales} into full regional inputs.
// Re-spread freed nationalist vote (SNP/Plaid below central) onto the mains, weighted to LAB/GRN.
function reallocNat(obj, key, baseline, w, cfg_ramp){ if(baseline==null||!w) return; const d=baseline-(obj[key]||0);
  // Only redistribute to parties still standing (>= floor). A party the user has zeroed must NOT
  // receive freed SNP/Plaid vote; its weight is shared among the surviving recipients (or, if none
  // qualify, the freed vote goes to the largest remaining party). MIN takes its fixed slice.
  const recips=['LAB','CON','RFM','LDM','GRN'], ramp=(cfg_ramp||0.03);
  let wsum=0; const eff={}; recips.forEach(function(p){ var v=Math.min(1,Math.max(0,(obj[p]||0)/ramp)); eff[p]=(w[p]||0)*v; wsum+=eff[p]; });
  const minPart=d*(w.MIN||0), mainPart=d-minPart;
  if(wsum>1e-6){ recips.forEach(function(p){ obj[p]=Math.max(0,(obj[p]||0)+mainPart*eff[p]/wsum); }); }
  else { var top=null,tv=-1; recips.forEach(function(p){ if((obj[p]||0)>tv){ tv=obj[p]||0; top=p; } }); if(top) obj[top]=Math.max(0,(obj[top]||0)+mainPart); }
  obj._minAdd=(obj._minAdd||0)+minPart; }
function expandInputs(c, cfg){
  const gb = c.gb, rs = cfg.resRegionalScale;
  const sc = regionalSwing(gb,'Scotland',cfg); sc.SNP=c.snpScotland||0; sc.RES=(gb.RES||0)*rs.Scotland;
  const wa = regionalSwing(gb,'Wales',cfg);    wa.PLC=c.plcWales||0;    wa.RES=(gb.RES||0)*rs.Wales;
  reallocNat(sc,'SNP',cfg.natBaseline&&cfg.natBaseline.SNP,cfg.natRealloc&&cfg.natRealloc.Scotland,cfg.natReallocRamp);
  reallocNat(wa,'PLC',cfg.natBaseline&&cfg.natBaseline.PLC,cfg.natRealloc&&cfg.natRealloc.Wales,cfg.natReallocRamp);
  const lo = regionalSwing(gb,'London',cfg);                            lo.RES=(gb.RES||0)*rs.London;
  return { gb, scotland:sc, wales:wa, london:lo };
}

// add suppressed MIN/OTH targets, mirroring  L5 = L4 / (sum(newMain)/sum(oldMain))^exp
function withMinorTargets(mainTarget, ge2024, engine, exp) {
  const mainKeys = MAIN_BY_ENGINE[engine];
  const ratio = sum(mainKeys.map(p=>mainTarget[p])) / sum(mainKeys.map(p=>ge2024[p]||0));
  const t = Object.assign({}, mainTarget);
  ['MIN','OTH'].forEach(p => { t[p] = (ge2024[p]||0) / Math.pow(ratio, exp); });
  return t;
}

// ---------- Stage 2-3: J-curve swing for one engine ----------
function swingEngine(seatsR, target, parties, cfg, opts) {
  // per-seat weak/strong
  const rows = seatsR.map(s => {
    const weak={}, strong={};
    parties.forEach(p => {
      const base = s.base[p]||0;
      const o = (p==='GRN' && opts.greenPenalty) ? {greenPenalty:true, con:s.base.CON||0, ref:s.base.RFM||0} : null;
      weak[p] = weakVote(base, o, cfg);
      strong[p] = base - weak[p];
    });
    return {s, weak, strong};
  });
  // regional aggregates (simple average, as the sheet's AVERAGE)
  const n = rows.length;
  const RStrong={}, RWeak={}, mult={};
  parties.forEach(p => {
    RStrong[p] = sum(rows.map(r=>r.strong[p]))/n;
    RWeak[p]   = sum(rows.map(r=>r.weak[p]))/n;
    mult[p]    = RWeak[p]>0 ? Math.max(0, (target[p]||0) - RStrong[p]) / RWeak[p] : 0;
  });
  // per-seat final vote, then calibrate region aggregate to target
  rows.forEach(r => {
    const fin={};
    parties.forEach(p => {
      const t=target[p]||0, st=r.strong[p], wk=r.weak[p], rs=RStrong[p];
      fin[p] = t >= rs ? st + wk*mult[p] : (rs>0 ? st*(t/rs) : 0);
      fin[p] = Math.max(0, fin[p]);
    });
    const tot = sum(parties.map(p=>fin[p]));
    r.share = {}; parties.forEach(p => r.share[p] = tot>0 ? fin[p]/tot : 0);
  });
  // calibrate: aggregate share by votes, scale each seat so region hits target
  const aggShare = {};
  const totVotes = sum(rows.map(r => r.s.electorate*r.s.turnout));
  parties.forEach(p => {
    const v = sum(rows.map(r => r.share[p]*r.s.electorate*r.s.turnout));
    aggShare[p] = totVotes>0 ? v/totVotes : 0;
  });
  rows.forEach(r => {
    const out={};
    parties.forEach(p => {
      const t=target[p]||0;
      out[p] = aggShare[p]>0 ? r.share[p]*(t/aggShare[p]) : r.share[p];
    });
    r.calib = out;
  });
  return rows;
}

// ---------- Stage 5: MRP swing — run PER NATION (SNP/PLC are nation-specific) ----------
const MRP_PARTIES = ['LAB','CON','RFM','LDM','GRN','SNP','PLC','OTH'];
function mrpSwing(seats, mrpKey, targetForNation, cfg) {
  const out={};
  ['England','Scotland','Wales'].forEach(nation=>{
    const target = targetForNation(nation);
    const rows = seats.filter(s=>s[mrpKey] && s.nation===nation).map(s=>{
      const weak={}, strong={};
      MRP_PARTIES.forEach(p=>{ const b=s[mrpKey][p]||0; weak[p]=weakVote(b,null,cfg); strong[p]=b-weak[p]; });
      return {s, weak, strong};
    });
    const n=rows.length; if(!n) return;
    const RStrong={}, RWeak={}, mult={};
    MRP_PARTIES.forEach(p=>{
      RStrong[p]=sum(rows.map(r=>r.strong[p]))/n;
      RWeak[p]=sum(rows.map(r=>r.weak[p]))/n;
      mult[p]=RWeak[p]>0?Math.max(0,(target[p]||0)-RStrong[p])/RWeak[p]:0;
    });
    rows.forEach(r=>{
      const fin={};
      MRP_PARTIES.forEach(p=>{ const t=target[p]||0,st=r.strong[p],wk=r.weak[p],rs=RStrong[p];
        fin[p]=Math.max(0, t>=rs? st+wk*mult[p] : (rs>0?st*(t/rs):0)); });
      const tot=sum(MRP_PARTIES.map(p=>fin[p]));
      const sh={}; MRP_PARTIES.forEach(p=> sh[p]= tot>0?fin[p]/tot:0);
      out[r.s.code]=sh;
    });
  });
  return out;
}

// ---------- Stage 6b: soft bloc bumpers ----------
function applySpecialSeats(seatShares, inputs, cfg){
  const sp=cfg.specialSeats; if(!sp) return;
  const P=cfg.pools, mains=['LAB','CON','RFM','LDM','GRN','RES'];
  const snpGB=((inputs.scotland&&inputs.scotland.SNP)||0)*P.scotland/P.gb;
  const plcGB=((inputs.wales&&inputs.wales.PLC)||0)*P.wales/P.gb;
  const curNat={}; let ms=0; mains.forEach(p=>{ curNat[p]=inputs.gb[p]||0; ms+=curNat[p]; });
  curNat.OTH=Math.max(0, 1-ms-snpGB-plcGB);
  const mix=cfg.specialMix, keys=['LAB','CON','RFM','LDM','GRN','RES','OTH'];
  seatShares.forEach(x=>{
    const sd=sp[x.s.code]; if(!sd) return;
    const blend=(sd.blend!=null)?sd.blend:cfg.specialBlend;
    const est={}; let es=0;
    keys.forEach(p=>{ const sv=sd.seatPoll[p]||0, nt=sd.natAtTime[p]||0, cn=curNat[p]||0;
      const add=sv+(cn-nt), prop=nt>0?sv*(cn/nt):sv; est[p]=Math.max(0, mix*add+(1-mix)*prop); es+=est[p]; });
    if(es>0) keys.forEach(p=>est[p]/=es);
    const f=x.final, fM=f.MIN||0, fO=f.OTH||0, os=fM+fO, rM=os>0?fM/os:1;
    const out={}; CANON.forEach(p=>out[p]=(1-blend)*(f[p]||0));
    keys.forEach(p=>{ if(p==='OTH'){ out.MIN+=blend*est.OTH*rM; out.OTH+=blend*est.OTH*(1-rM); } else out[p]+=blend*est[p]; });
    let ts=0; CANON.forEach(p=>ts+=out[p]); if(ts>0) CANON.forEach(p=>out[p]/=ts);
    x.final=out;
  });
}
function applyBlocBumpers(seatShares, inputs, cfg) {
  const bp = cfg.blocProtection || {};
  if (!bp.strength || bp.strength <= 0) return;
  const totVotes = sum(seatShares.map(x => x.s.electorate*x.s.turnout));
  const agg = {};
  CANON.forEach(p => {
    agg[p] = sum(seatShares.map(x => (x.final[p]||0)*x.s.electorate*x.s.turnout)) / totVotes;
  });
  const blocTargets = {
    left:  (inputs.gb.LAB||0)+(inputs.gb.GRN||0)+(inputs.gb.LDM||0),
    right: (inputs.gb.CON||0)+(inputs.gb.RFM||0)+(inputs.gb.RES||0),
  };
  const factor = {}; CANON.forEach(p => factor[p] = 1);
  ['left','right'].forEach(bl => {
    const members = cfg.blocs[bl];
    const blocAgg = sum(members.map(p => agg[p]||0));
    const target = blocTargets[bl];
    if (blocAgg > 0 && blocAgg < target - bp.deadband) {
      const boosted = blocAgg + bp.strength * ((target - bp.deadband) - blocAgg);
      const f = boosted / blocAgg;
      members.forEach(p => factor[p] = f);
    }
  });
  if (CANON.every(p => factor[p] === 1)) return;
  seatShares.forEach(x => {
    CANON.forEach(p => x.final[p] = (x.final[p]||0)*factor[p]);
    const t = sum(CANON.map(p => x.final[p]));
    CANON.forEach(p => x.final[p] = t>0 ? x.final[p]/t : 0);
  });
}

// ---------- Stage 4: tactical voting (clarity model) ----------


// ---------- top level ----------
function runNowcast(inputs, data, cfgOverride) {
  const cfg = Object.assign({}, CONFIG, cfgOverride||{});
  const seats = data.seats;
  const cd = data.config_data;

  // Compact inputs ({gb, snpScotland, plcWales}) get expanded via regional anchoring.
  // Full inputs (with .scotland/.wales/.london, e.g. the GE2024 preset) are used as-is.
  if (inputs && inputs.gb && !inputs.scotland) inputs = expandInputs(inputs, cfg);

  // Stage 1
  const targets = regionalTargets(inputs, cfg);

  // Stage 2-3: transition model per engine -> calibrated shares per seat
  const transShare = {};   // code -> {party:share} (10-party canon)
  ['EngExLondon','London','Scotland','Wales'].forEach(engine=>{
    const parties = ENGINE_PARTIES[engine];
    const tgt = withMinorTargets(targets[engine], cd.region_ge2024[engine], engine, cfg.othersExponent.transition);
    if(engine==='Scotland' && inputs.scotland) tgt.MIN=(tgt.MIN||0)+Math.max(0,inputs.scotland._minAdd||0);
    if(engine==='Wales' && inputs.wales) tgt.MIN=(tgt.MIN||0)+Math.max(0,inputs.wales._minAdd||0);
    const seatsR = seats.filter(s=>s.engine===engine);
    const rows = swingEngine(seatsR, tgt, parties, cfg, {greenPenalty:true});
    rows.forEach(r=>{ const o={}; CANON.forEach(p=>o[p]=r.calib[p]||0); transShare[r.s.code]=o; });
  });

  // Stage 4: tactical voting on the transition shares
  const tvShare = TV.apply(seats, transShare, cfg);

  // Stage 5: MRP swings toward inputs — main parties = GB inputs; SNP/PLC per nation
  const mrpTarget = (baseline) => (nation) => {
    // use each nation's own regional vote-share targets for the mains (not GB), so e.g. Welsh
    // Conservatives swing toward the Welsh level rather than the GB level.
    const m = nation==='Scotland' ? inputs.scotland : nation==='Wales' ? inputs.wales : inputs.gb;
    const t = { LAB:m.LAB, CON:m.CON, RFM:m.RFM, LDM:m.LDM, GRN:m.GRN,
                SNP: nation==='Scotland' ? (inputs.scotland.SNP||0) : 0,
                PLC: nation==='Wales'    ? (inputs.wales.PLC||0)    : 0 };
    return withMRPMinor(t, baseline, cfg);
  };
  const yg  = mrpSwing(seats, 'yougov', mrpTarget(cd.mrp_baseline.yougov), cfg);
  const mic = mrpSwing(seats, 'mic',    mrpTarget(cd.mrp_baseline.mic),    cfg);

  // Stage 6: blend -> per-seat final shares
  const MAINP=['LAB','CON','RFM','LDM','GRN','SNP','PLC'];
  const seatShares = seats.map(s=>{
    const tv = tvShare[s.code] || transShare[s.code];
    const y = yg[s.code], m = mic[s.code];
    const res = tv.RES||0, k=cfg.scaleMRPbyRestore?(1-res):1;
    const final = {};
    // mains: STM blended with the MRPs
    MAINP.forEach(p=>{ final[p] = cfg.blend.transition*(tv[p]||0) + cfg.blend.yougov*k*((y&&y[p])||0) + cfg.blend.mic*k*((m&&m[p])||0); });
    final.RES = tv.RES||0;   // Restore: STM only
    // 'Other' pool: blended exactly like the 'Add MRP Data' cell. Each MRP reports a SINGLE
    // 'Others' value per seat; we blend 0.67 STM + 0.165 YouGov + 0.165 MiC to get one combined
    // 'Other' total, then split it MIN (largest) / OTH (rest) using the STM's own MIN:OTH ratio
    // (e.g. STM 15/5 -> 75% MIN, 25% OTH). The MRP 'Other' targets are now correctly scaled
    // (withMRPMinor), so this no longer balloons in independent-strong seats - and no caps.
    const oM=tv.MIN||0, oO=tv.OTH||0, oSum=oM+oO;
    // Split the combined 'Other' total MIN/OTH using the seat's NOTIONAL 2024 ratio, so the
    // proportion of MIN to OTH stays fixed at its 2024 level (fall back to STM, then 50/50).
    const bM=s.base.MIN||0, bO=s.base.OTH||0, bSum=bM+bO;
    const rMIN = bSum>0 ? bM/bSum : (oSum>0 ? oM/oSum : 0.5), rOTH = 1-rMIN;
    const otherTotal = cfg.blend.transition*oSum
                     + cfg.blend.yougov*k*((y&&y.OTH)||0)
                     + cfg.blend.mic*k*((m&&m.OTH)||0);
    final.MIN = otherTotal*rMIN;
    final.OTH = otherTotal*rOTH;
    if(final.OTH>final.MIN){ const tmp=final.MIN; final.MIN=final.OTH; final.OTH=tmp; }  // MIN >= OTH always
    const tot = sum(CANON.map(p=>final[p]));
    CANON.forEach(p=> final[p] = tot>0?final[p]/tot:0);
    return { s, final };
  });

  applyBlocBumpers(seatShares, inputs, cfg);
  applySpecialSeats(seatShares, inputs, cfg);

  const results = seatShares.map(({s, final})=>{
    let winner = CANON.reduce((a,b)=> final[b]>final[a]?b:a, CANON[0]);  // plurality wins: the declared winner always matches the top bar (incl. MIN/WPB)
    if (s.incumbent2024==='SPKR') winner = 'SPKR';
    return { seatName:s.name, code:s.code, winner, minType:(s.minType||'MIN'),
             winner2024:s.w24||s.incumbent2024, winner2019:s.w19||null, mp:s.mp||null,
             shares:final, incumbent:s.incumbent2024 };
  });

  const order=['LAB','CON','RFM','LDM','GRN','SNP','PLC','MIN'];
  const counts={}; order.forEach(p=>counts[p]=0);
  results.forEach(r=>{ if(counts[r.winner]!=null) counts[r.winner]++; });
  return { aggregateSeats: order.map(p=>counts[p]), individualSeatResults: results,
           winnerByCode: Object.fromEntries(results.map(r=>[r.code,r.winner])) };
}

/* CANON shared from tactical */
function withMRPMinor(mainTarget, baseline, cfg){
  // Only count parties that actually stand in this nation's target. The MRP baseline stores
  // SNP/Plaid at their WITHIN-NATION share (~29%/20%); including those in England's ratio
  // (where SNP=PLC=0) collapses the denominator and the ^exp blows the OTH target past 100%.
  const mainKeys=['LAB','CON','RFM','LDM','GRN','SNP','PLC'].filter(p=>(mainTarget[p]||0)>0);
  const den = sum(mainKeys.map(p=>baseline[p]||0));
  const ratio = den>0 ? sum(mainKeys.map(p=>mainTarget[p]||0)) / den : 1;
  // Clamp to >=1 so a regional<national mains gap can't inflate the MRP 'other' target.
  const rr = Math.max(1, ratio);
  const t=Object.assign({}, mainTarget);
  t.OTH = (baseline.OTH||0)/Math.pow(rr, cfg.othersExponent.mrp);
  return t;
}



window.NowcastEngine = { runNowcast: runNowcast, CONFIG: CONFIG, regionalTargets: regionalTargets, expandInputs: expandInputs };

  function buildGE2024(seats,cfg){ var P=['LAB','CON','RFM','LDM','GRN','RES','SNP','PLC','MIN','OTH'],acc={},tot=0; P.forEach(function(p){acc[p]=0;});

  function runMC(n){
    if(!ENGINE||!window.NowcastEngine){ var m=$('mc'); if(m) m.style.display='none'; return; }

          var w=(bw==='MIN'&&r.minType)?r.minType:(bw||r.winner);

        var top=null, tn=-1; for(var q in t){ if(t[q]>tn){ tn=t[q]; top=q; } }

      }

  function renderMC(d){

    var ta=document.createElement('textarea'); ta.value=url; document.body.appendChild(ta); ta.select(); try{ document.execCommand('copy'); $('copied').style.display='block'; setTimeout(function(){$('copied').style.display='none';},1800);}catch(e){ prompt('Copy link:',url);} document.body.removeChild(ta); });
});

(function(){
  function postH(){ try{ var h=Math.ceil(document.documentElement.getBoundingClientRect().height); if(window.parent!==window) window.parent.postMessage({nowcastHeight:h},"*"); }catch(e){} }
  window.addEventListener("load",postH); window.addEventListener("resize",postH);
  if(window.ResizeObserver){ try{ new ResizeObserver(postH).observe(document.body); }catch(e){} }
  setInterval(postH, 1200);
})();
